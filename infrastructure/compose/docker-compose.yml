services:
  postgres:
    image: postgres:17
    container_name: postgres
    restart: unless-stopped

    env_file:
      - .env

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    volumes:
      - ../data/postgres:/var/lib/postgresql/data

    networks:
      - enterprise-network


  gitea:
    image: gitea/gitea:1.24
    container_name: gitea
    restart: unless-stopped

    env_file:
      - .env

    depends_on:
      - postgres

    ports:
      - "3000:3000"
      - "2222:22"

    volumes:
      - ../data/gitea:/data

    networks:
      - enterprise-network


  portainer:
    image: portainer/portainer-ce:lts
    container_name: portainer
    restart: unless-stopped

    ports:
      - "9000:9000"

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ../data/portainer:/data

    networks:
      - enterprise-network


networks:
  enterprise-network:
    external: true
